<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKM | القوة الميكانيكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --black: #000000; --gray: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--black); color: #fff; overflow-x: hidden; }

        /* الهيدر الصايع */
        nav { background: #000; padding: 20px; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 30px; font-weight: 900; color: #fff; text-shadow: 2px 2px var(--red); }

        /* واجهة الموقع (البانر) */
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1510166299106-9b55502a9072?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 5px solid var(--red); }
        .hero h1 { font-size: 4rem; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .hero h1 span { color: var(--red); }
        .hero p { font-size: 1.5rem; color: #ccc; }

        /* قسم الصور (الصور ظاهرة وكبيرة) */
        .section { padding: 60px 20px; text-align: center; }
        .section h2 { font-size: 2.5rem; margin-bottom: 40px; border-right: 10px solid var(--red); padding-right: 15px; display: inline-block; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .img-box { position: relative; border: 2px solid var(--gray); overflow: hidden; height: 300px; border-radius: 10px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; filter: brightness(0.7); }
        .img-box:hover img { filter: brightness(1); transform: scale(1.1); }
        .img-box .label { position: absolute; bottom: 0; background: var(--red); color: #fff; width: 100%; padding: 10px; font-weight: 900; }

        /* تواصل معنا (واضحة جداً) */
        .contact-bar { background: var(--gray); padding: 50px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; border-top: 2px solid var(--red); }
        .c-item { background: #000; padding: 30px; border-radius: 10px; border-top: 4px solid var(--red); }
        .c-item i { font-size: 3rem; color: var(--red); margin-bottom: 15px; }
        .c-item h4 { font-size: 1.5rem; margin-bottom: 10px; }
        .c-item a, .c-item p { color: #fff; text-decoration: none; font-size: 1.2rem; font-weight: bold; }

        /* زرار واتساب اللي بيلعلع */
        .wa { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: #fff; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 0 20px #25d366; animation: pulse 1.5s infinite; text-decoration: none; z-index: 10000; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        footer { background: #000; padding: 20px; color: #444; font-weight: bold; border-top: 1px solid var(--gray); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MKM <span>FIRE</span></div>
        <div style="color: var(--red); font-weight: 900;">فرع رمسيس <i class="fas fa-tools"></i></div>
    </nav>

    <div class="hero">
        <h1>هندسة <span>الضغط</span></h1>
        <p>توريد وتركيب طلمبات وشبكات الرش - جودة رمسيس</p>
    </div>

    <section class="section">
        <h2>معرض الصور (طلمبات ورش)</h2>
        <div class="gallery">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&q=80" alt="طلمبة">
                <div class="label">غرف طلمبات ديزل</div>
            </div>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1542125387-c712c4d8c11e?auto=format&fit=crop&q=80" alt="شبكة رش">
                <div class="label">شبكات رشاشات مياه</div>
            </div>
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1606857121768-e4b526b38c23?auto=format&fit=crop&q=80" alt="صيانة">
                <div class="label">صيانة واختبار ضغوط</div>
            </div>
        </div>
    </section>

    <section class="contact-bar">
        <div class="c-item">
            <i class="fab fa-whatsapp"></i>
            <h4>واتساب</h4>
            <a href="https://wa.me/201000000000">01000000000</a>
        </div>
        <div class="c-item">
            <i class="fas fa-phone"></i>
            <h4>أرضي رمسيس</h4>
            <p>02-12345678</p>
        </div>
        <div class="c-item">
            <i class="fas fa-envelope"></i>
            <h4>إيميل الشغل</h4>
            <a href="mailto:info@mkm.com">info@mkm.com</a>
        </div>
    </section>

    <a href="https://wa.me/201000000000" class="wa"><i class="fab fa-whatsapp"></i></a>

    <footer style="text-align: center;">
        بواسطة ديشا هنتر &copy; 2026
    </footer>

</body>
</html>
