<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKM LUKA.Fire | التميز في أنظمة الإطفاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e63946; --dark: #0b0d17; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background-color: #f8f9fa; scroll-behavior: smooth; }
        
        /* ضبط الحاويات للموبايل والشاشات الكبيرة */
        .section-container { width: 92%; max-width: 1200px; margin: 0 auto; padding: 60px 0; }

        /* الهيدر الفخم */
        nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 15px; }
        .brand img { height: 60px; border-radius: 8px; }

        /* قسم الترحيب الرئيسي */
        .hero { background: linear-gradient(rgba(11, 13, 23, 0.85), rgba(11, 13, 23, 0.85)), url('IMG-20260504-WA0023.jpg'); 
                height: 80vh; background-size: cover; background-position: center; display: flex; align-items: center; color: white; text-align: center; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 20px; color: var(--primary); }

        /* معرض الصور (الميزة الأساسية) */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .img-card { position: relative; border-radius: 20px; overflow: hidden; height: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .img-card:hover img { transform: scale(1.1); }

        /* قسم التواصل الذكي */
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 40px; }
        .contact-item { background: white; padding: 30px; border-radius: 20px; text-align: center; transition: 0.3s; }
        .contact-item:hover { background: var(--primary); color: white; }
        .contact-item i { font-size: 2.5rem; margin-bottom: 15px; }

        /* زرار واتساب عايم */
        .wa-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; 
                    display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); z-index: 2000; }
    </style>
</head>
<body>

<nav>
    <div class="section-container nav-flex" style="padding: 0;">
        <div class="brand">
            <img src="IMG-20260504-WA0022.jpg" alt="MKM Logo">
            <div style="font-weight: 900; font-size: 1.5rem; color: var(--dark);">MKM <span style="color: var(--primary);">LUKA.Fire</span></div>
        </div>
    </div>
</nav>

<header class="hero">
    <div class="section-container">
        <h1>الخبير لأنظمة إطفاء الحريق</h1>
        <p style="font-size: 1.3rem;">حماية متكاملة لمنشأتك بأيدي خبراء معتمدين منذ 2012</p>
        <a href="#contact" style="background: var(--primary); color: white; padding: 15px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; display: inline-block;">اطلب معاينة مجانية</a>
    </div>
</header>

<main class="section-container">
    <h2 style="text-align: center; margin-bottom: 50px; font-weight: 900;">معرض سوابق الأعمال 👷‍♂️</h2>
    <div class="gallery-grid">
        <div class="img-card"><img src="IMG-20260504-WA0023.jpg" alt="تجهيزات MKM"></div>
        <div class="img-card"><img src="IMG-20260504-WA0023.jpg" alt="أنظمة إطفاء"></div>
        <div class="img-card"><img src="IMG-20260504-WA0023.jpg" alt="صيانة دورية"></div>
    </div>

    <section id="contact" class="section-padding">
        <h2 style="text-align: center; margin: 60px 0 30px; font-weight: 900;">تواصل مع الخبير</h2>
        <div class="contact-grid">
            <div class="contact-item">
                <i class="fas fa-phone-alt"></i>
                <h3>الخط الأرضي</h3>
                <p>0223456789</p>
            </div>
            <div class="contact-item">
                <i class="fas fa-envelope-open-text"></i>
                <h3>البريد الرسمي</h3>
                <p>info@mkm-khabeer.com</p>
            </div>
            <div class="contact-item">
                <i class="fas fa-map-marker-alt"></i>
                <h3>مقر الشركة</h3>
                <p>القاهرة - حدائق حلوان</p>
            </div>
        </div>
    </section>
</main>

<a href="https://wa.me/201234567890" class="wa-float"><i class="fab fa-whatsapp"></i></a>

<footer>
    <p style="text-align: center; padding: 40px; background: var(--dark); color: #666; margin: 0;">
        تطوير وبرمجة: مصطفى محمد (Desha) &copy; 2026
    </p>
</footer>

</body>
</html>
